<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Deep Work Plan">
  <style>
    .tile { fill: #fafaf7; }
    .g-light { display: inline; }
    .g-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #14171c; }
      .g-light { display: none; }
      .g-dark { display: inline; }
    }
  </style>
  <rect class="tile" x="0" y="0" width="64" height="64" rx="14"/>
  <image class="g-light" x="3" y="3" width="58" height="58" href="data:image/png;base64,"/>
  <image class="g-dark" x="3" y="3" width="58" height="58" href="data:image/png;base64,"/>
</svg>
